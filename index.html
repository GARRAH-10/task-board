<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Task Board</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <h1>My Task Board</h1>

    <div class="header-controls">
      <span id="taskCounter">Total Tasks: 0</span>

      <select id="priorityFilter">
        <option value="all">All Priorities</option>
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>
    </div>
  </header>

  <main class="board">

    <section class="column" id="todo">
      <h2>To Do</h2>
      <ul id="todoList"></ul>
      <button class="add-task-btn" data-column="todo">Add Task</button>
    </section>

    <section class="column" id="inprogress">
      <h2>In Progress</h2>
      <ul id="inprogressList"></ul>
      <button class="add-task-btn" data-column="inprogress">Add Task</button>
    </section>

    <section class="column" id="done">
      <h2>Done</h2>
      <ul id="doneList"></ul>
      <button class="add-task-btn" data-column="done">Add Task</button>
      <button id="clearDoneBtn">Clear All</button>
    </section>

  </main>

  <!-- Modal -->
  <div id="taskModal" class="modal hidden">
    <div class="modal-content">
      <h3 id="modalTitle">Add Task</h3>

      <label for="taskTitle">Title</label>
      <input type="text" id="taskTitle" />

      <label for="taskDescription">Description</label>
      <textarea id="taskDescription"></textarea>

      <label for="taskPriority">Priority</label>
      <select id="taskPriority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
      </select>

      <label for="taskDueDate">Due Date</label>
      <input type="date" id="taskDueDate" />

      <div class="modal-actions">
        <button id="saveTaskBtn">Save</button>
        <button id="cancelTaskBtn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="taskmanager.js"></script>
</body>
</html>
